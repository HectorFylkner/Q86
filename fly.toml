# Fly.io config for a personal Q86 instance. See DEPLOY.md for the
# three-command setup. The volume holds ./data (SQLite + scratch photos);
# auto-stop keeps cost near zero when you are not training.
app = "q86"
primary_region = "arn"

[build]
  dockerfile = "Dockerfile"

[mounts]
  source = "q86_data"
  destination = "/app/data"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
